<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Sales - Catálogo</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

body{
  background:#eef2f7;
  color:#111827;
}

.hidden{
  display:none !important;
}

.hero{
  background:white;
  padding:18px 18px 24px;
  border-bottom:4px solid #e4c441;
  text-align:center;
}

.logo{
  width:190px;
  max-width:90%;
  margin:0 auto 10px;
  display:block;
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:9px;
  background:#dbeafe;
  color:#1d4f91;
  padding:9px 17px;
  border-radius:999px;
  font-weight:700;
  margin-bottom:15px;
  font-size:15px;
}

.hero-badge::before{
  content:"";
  width:11px;
  height:11px;
  border-radius:50%;
  background:#36c56d;
  box-shadow:0 0 10px #36c56d;
}

.hero h1{
  font-size:58px;
  line-height:1.05;
  margin:14px 0;
}

.hero p{
  color:#4b5563;
  font-size:18px;
  max-width:760px;
  margin:auto;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:22px;
}

.access-card{
  background:white;
  border-radius:24px;
  padding:28px;
  box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.access-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:24px;
}

.access-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.access-btn{
  border:none;
  border-radius:22px;
  padding:24px;
  font-size:24px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
}

.access-btn:hover{
  transform:translateY(-4px);
}

.btn-mayorista{
  background:#0f172a;
  color:white;
}

.btn-revendedor{
  background:#5dade2;
  color:#0f172a;
}

.btn-admin{
  background:#e8c547;
  color:#111827;
}

.card{
  background:white;
  border-radius:22px;
  padding:20px;
  margin-top:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.filters{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:14px;
}

input,select{
  padding:15px;
  border-radius:15px;
  border:1px solid #d1d5db;
  font-size:15px;
  width:100%;
}

.categories{
  display:flex;
  gap:12px;
  overflow:auto;
}

.cat-btn{
  border:none;
  padding:12px 20px;
  border-radius:999px;
  background:#e5e7eb;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
}

.cat-btn.active{
  background:#38bdf8;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.stat-box{
  background:white;
  border-radius:22px;
  padding:18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.stat-box h3{
  font-size:30px;
  margin-bottom:5px;
}

.stat-box p{
  color:#6b7280;
  font-weight:600;
}

.grid{
  margin-top:22px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.product-card{
  background:white;
  border-radius:20px;
  padding:16px;
  box-shadow:0 5px 16px rgba(0,0,0,.05);
  transition:.2s;
  cursor:pointer;
}

.product-card:hover{
  transform:translateY(-4px);
}

.product-img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:16px;
  background:#f5f7fb;
  margin-bottom:14px;
}

.product-title{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
}

.product-meta{
  color:#6b7280;
  margin-bottom:10px;
  font-size:14px;
}

.qty{
  display:inline-block;
  margin-top:12px;
  background:#eef2ff;
  color:#4338ca;
  padding:7px 13px;
  border-radius:999px;
  font-weight:700;
}

.price{
  margin-top:12px;
  font-size:20px;
  font-weight:800;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:100;
}

.modal-content{
  background:white;
  width:100%;
  max-width:900px;
  border-radius:24px;
  padding:24px;
  max-height:90vh;
  overflow:auto;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  border:none;
  background:#ef4444;
  color:white;
  width:42px;
  height:42px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:13px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}

@media(max-width:900px){
  .access-grid{
    grid-template-columns:1fr;
  }

  .filters{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }
}

@media(max-width:650px){
  .hero{
    padding:18px 14px;
  }

  .logo{
    width:150px;
    margin-bottom:10px;
  }

  .hero-badge{
    font-size:14px;
    padding:9px 15px;
    margin-bottom:14px;
  }

.hero h1{
  font-size:34px;
}

  .hero p{
    font-size:16px;
    line-height:1.35;
  }

  .container{
    padding:18px;
  }

  .access-card{
    padding:24px;
    border-radius:24px;
  }

  .access-title{
    font-size:32px;
    line-height:1.1;
    margin-bottom:22px;
  }

  .access-btn{
    font-size:21px;
    padding:22px;
    border-radius:22px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .product-img{
    height:150px;
  }

  .product-title{
    font-size:19px;
  }
}
</style>
</head>

<body>

<section id="home">
  <div class="hero">
    <img src="logo.png" class="logo" alt="Technology Sales">

    <div class="hero-badge">
      Inventario actualizado para clientes
    </div>

    <h1>Catálogo de Inventario</h1>

    <p>
      Consulta disponibilidad, precios, colores y sucursales en tiempo real.
    </p>
  </div>

  <div class="container">
    <div class="access-card">
      <div class="access-title">
        Selecciona tu acceso
      </div>

      <div class="access-grid">
        <button class="access-btn btn-mayorista" onclick="login('mayorista')">
          📦 Mayoristas
        </button>

        <button class="access-btn btn-revendedor" onclick="login('revendedor')">
          🛒 Revendedores
        </button>

        <button class="access-btn btn-admin" onclick="login('administracion')">
          ⚙️ Administración
        </button>
      </div>
    </div>
  </div>
</section>

<section id="portal" class="hidden">
  <div class="container">

    <div class="card">
      <h2 id="roleTitle">Catálogo</h2>
      <p id="updatedText">Cargando inventario...</p>
    </div>

    <div class="card">
      <div class="categories">
        <button class="cat-btn active" onclick="setCategory('',event)">Todos</button>
        <button class="cat-btn" onclick="setCategory('Celulares',event)">📱 Celulares</button>
        <button class="cat-btn" onclick="setCategory('Tablets',event)">📟 Tablets</button>
        <button class="cat-btn" onclick="setCategory('Laptops',event)">💻 Laptops</button>
        <button class="cat-btn" onclick="setCategory('Relojes',event)">⌚ Relojes</button>
        <button class="cat-btn" onclick="setCategory('Consolas',event)">🎮 Consolas</button>
        <button class="cat-btn" onclick="setCategory('Televisores',event)">📺 Televisores</button>
        <button class="cat-btn" onclick="setCategory('Accesorios',event)">🎧 Accesorios</button>
      </div>
    </div>

    <div class="card">
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Buscar modelo...">

        <select id="brandFilter">
          <option value="">Todas las marcas</option>
        </select>

        <select id="statusFilter">
          <option value="">Todos los estados</option>
          <option>Nuevo</option>
          <option>Usado</option>
          <option>En caja</option>
        </select>

        <select id="branchFilter">
          <option value="">Todas las sucursales</option>
        </select>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <h3 id="statModels">0</h3>
        <p>Modelos</p>
      </div>

      <div class="stat-box">
        <h3 id="statUnits">0</h3>
        <p>Unidades</p>
      </div>

      <div class="stat-box">
        <h3 id="statBranches">0</h3>
        <p>Sucursales</p>
      </div>
    </div>

    <div class="grid" id="productGrid"></div>

  </div>
</section>

<div class="modal" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>

      <button class="close-btn" onclick="closeModal()">
        ✕
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Sucursal</th>
          <th>Color</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Estado</th>
        </tr>
      </thead>

      <tbody id="modalBody"></tbody>
    </table>
  </div>
</div>

<script>
const PASSWORDS = {
  mayorista:"MAYOR2026",
  revendedor:"REVENTA2026",
  administracion:"Ventas2026"
};

const API_URL = "https://script.google.com/macros/s/AKfycbyO1hzcv7fvk0vwDgphPvl6TMvq8ptHYJ1cEbizdWeWUQYLKadeosJ179t5-OBEifLS/exec";

let inventoryData = [];
let currentRole = "";
let currentCategory = "";

const searchInput = document.getElementById("searchInput");
const brandFilter = document.getElementById("brandFilter");
const statusFilter = document.getElementById("statusFilter");
const branchFilter = document.getElementById("branchFilter");

searchInput.addEventListener("input", renderCards);
brandFilter.addEventListener("change", renderCards);
statusFilter.addEventListener("change", renderCards);
branchFilter.addEventListener("change", renderCards);

async function login(role){
  const password = prompt("Ingrese contraseña");

  if(password !== PASSWORDS[role]){
    alert("Contraseña incorrecta");
    return;
  }

  currentRole = role;

  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    inventoryData = data.map(row => ({
      categoria: row["Categoria"] || "",
      marca: row["Marca"] || "",
      modelo: row["Modelo"] || "",
      capacidad: row["Capacidad"] || "",
      color: row["Color"] || "",
      sucursal: row["Sucursal"] || "",
      cantidad: Number(row["Cantidad"]) || 0,
      precioMayorista: row["Precio Mayorista"] || "",
      precioReventa: row["Precio Reventa"] || "",
      estado: row["Estado"] || "",
      imagen: row["Imagen"] || ""
    }));

    document.getElementById("home").classList.add("hidden");
    document.getElementById("portal").classList.remove("hidden");

    const titles = {
      mayorista:"Catálogo Mayorista",
      revendedor:"Catálogo Revendedor",
      administracion:"Panel Administración"
    };

    document.getElementById("roleTitle").textContent = titles[role] || "Catálogo";

    document.getElementById("updatedText").textContent =
      "Última actualización: " + new Date().toLocaleString("es-HN");

    loadBranches();
    loadBrands();
    renderCards();

  }catch(error){
    console.error(error);
    alert("Error cargando inventario");
  }
}

function setCategory(category,event){
  currentCategory = category;

  document.querySelectorAll(".cat-btn")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  renderCards();
}

function getFilteredData(){
  const search = searchInput.value.trim().toLowerCase();
  const brand = brandFilter.value.trim().toLowerCase();
  const status = statusFilter.value.trim().toLowerCase();
  const branch = branchFilter.value.trim().toLowerCase();

  return inventoryData.filter(item => {
    const text =
      `${item.modelo} ${item.marca} ${item.color} ${item.capacidad}`.toLowerCase();

    return text.includes(search)
      && (!brand || item.marca.toLowerCase() === brand)
      && (!status || item.estado.toLowerCase() === status)
      && (!branch || item.sucursal.toLowerCase() === branch)
      && (!currentCategory || item.categoria.toLowerCase() === currentCategory.toLowerCase());
  });
}

function groupProducts(data){
  const grouped = {};

  data.forEach(item => {
    const key = `${item.marca}|${item.modelo}|${item.capacidad}`;

    if(!grouped[key]){
      grouped[key] = {
        key,
        marca:item.marca,
        modelo:item.modelo,
        capacidad:item.capacidad,
        imagen:item.imagen,
        cantidad:0,
        colores:{},
        precioMayorista:item.precioMayorista,
        precioReventa:item.precioReventa,
        items:[]
      };
    }

    grouped[key].cantidad += item.cantidad;

    grouped[key].colores[item.color] =
      (grouped[key].colores[item.color] || 0) + item.cantidad;

    grouped[key].items.push(item);
  });

  return Object.values(grouped)
    .sort((a,b) => a.modelo.localeCompare(b.modelo));
}

function renderCards(){
  const filteredData = getFilteredData();
  const products = groupProducts(filteredData);

  renderSummary(filteredData,products);

  const grid = document.getElementById("productGrid");

  grid.innerHTML = "";

  if(products.length === 0){
    grid.innerHTML = `<div class="card">No hay productos disponibles.</div>`;
    return;
  }

  products.forEach(product => {
    const colores =
      Object.entries(product.colores)
      .map(([c,q]) => `${c}: ${q}`)
      .join(", ");

    let precio = "";

    if(currentRole === "mayorista"){
      precio = product.precioMayorista;
    }

    if(currentRole === "revendedor"){
      precio = product.precioReventa;
    }

    if(currentRole === "administracion"){
      precio = `M: ${product.precioMayorista} | R: ${product.precioReventa}`;
    }

    grid.innerHTML += `
      <div class="product-card" onclick="openDetail('${product.key}')">

        ${product.imagen ? `
          <img
            src="${product.imagen}"
            class="product-img"
            alt="${product.modelo}"
            onerror="this.style.display='none'"
          >
        ` : ""}

        <div class="product-title">${product.modelo}</div>

        <div class="product-meta">
          ${product.marca} · ${product.capacidad}
        </div>

        <div>
          <strong>Colores:</strong> ${colores}
        </div>

        <div class="qty">
          ${product.cantidad} unidades
        </div>

        <div class="price">
          ${precio}
        </div>

      </div>
    `;
  });
}

function openDetail(key){
  const products = groupProducts(getFilteredData());
  const product = products.find(p => p.key === key);

  if(!product) return;

  document.getElementById("detailModal").style.display = "flex";

  document.getElementById("modalTitle").textContent =
    `${product.modelo} ${product.capacidad}`;

  document.getElementById("modalBody").innerHTML =
    product.items.map(item => {
      let precio = "";

      if(currentRole === "mayorista"){
        precio = item.precioMayorista;
      }

      if(currentRole === "revendedor"){
        precio = item.precioReventa;
      }

      if(currentRole === "administracion"){
        precio = `${item.precioMayorista} / ${item.precioReventa}`;
      }

      return `
        <tr>
          <td>${item.sucursal}</td>
          <td>${item.color}</td>
          <td>${item.cantidad}</td>
          <td>${precio}</td>
          <td>${item.estado}</td>
        </tr>
      `;
    }).join("");
}

function closeModal(){
  document.getElementById("detailModal").style.display = "none";
}

function renderSummary(data,products){
  const branches =
    [...new Set(data.map(i => i.sucursal).filter(Boolean))];

  const totalUnits =
    data.reduce((sum,item) => sum + (Number(item.cantidad) || 0),0);

  document.getElementById("statModels").textContent = products.length;
  document.getElementById("statUnits").textContent = totalUnits;
  document.getElementById("statBranches").textContent = branches.length;
}

function loadBranches(){
  branchFilter.innerHTML = `<option value="">Todas las sucursales</option>`;

  const branches =
    [...new Set(inventoryData.map(i => i.sucursal).filter(Boolean))].sort();

  branches.forEach(branch => {
    branchFilter.innerHTML += `<option>${branch}</option>`;
  });
}

function loadBrands(){
  brandFilter.innerHTML = `<option value="">Todas las marcas</option>`;

  const brands =
    [...new Set(inventoryData.map(i => i.marca).filter(Boolean))].sort();

  brands.forEach(brand => {
    brandFilter.innerHTML += `<option>${brand}</option>`;
  });
}
</script>

</body>
</html>
