<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Sales - Catálogo</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --black:#0f172a;
  --blue:#38bdf8;
  --yellow:#e4c441;
  --bg:#eef2f7;
  --text:#111827;
  --muted:#64748b;
  --border:#dbe7f5;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

body{
  background:linear-gradient(to bottom,#f8fbff,#eef2f7);
  color:var(--text);
}

.hidden{
  display:none !important;
}

.hero{
  background:#ffffff;
  border-bottom:4px solid var(--yellow);
  padding:24px 20px;
}

.hero-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:70px;
}

.logo{
  width:220px;
  max-width:90%;
  height:auto;
  object-fit:contain;
}

.hero-text{
  text-align:left;
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#dbeafe;
  color:#1d4f91;
  padding:8px 16px;
  border-radius:999px;
  font-weight:700;
  margin-bottom:10px;
  font-size:14px;
}

.hero-badge::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:#36c56d;
  box-shadow:0 0 10px #36c56d;
}

.hero h1{
  font-size:34px;
  line-height:1.1;
  margin-bottom:6px;
  color:var(--black);
}

.hero p{
  color:#4b5563;
  font-size:16px;
  max-width:650px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:22px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.access-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:8px;
  color:var(--black);
}

.access-sub{
  color:#6b7280;
  margin-bottom:22px;
}

.access-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.access-btn{
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
}

.access-btn:hover{
  transform:translateY(-3px);
}

.btn-mayorista{
  background:#0f172a;
  color:white;
}

.btn-revendedor{
  background:#5dade2;
  color:#0f172a;
}

.btn-admin{
  background:#e8c547;
  color:#111827;
}

.portal-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:15px;
  flex-wrap:wrap;
}

.portal-head h2{
  margin:0;
  font-size:28px;
}

.portal-head p{
  margin:7px 0 0;
  color:var(--muted);
}

.sync-status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#ecfeff;
  color:#0369a1;
  font-weight:bold;
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
}

.sync-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 0 4px rgba(34,197,94,.15);
}

.categories{
  display:flex;
  gap:10px;
  overflow:auto;
  padding-bottom:3px;
}

.cat-btn{
  border:none;
  padding:11px 18px;
  border-radius:999px;
  background:#e5e7eb;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:.2s;
}

.cat-btn:hover{
  background:#dbeafe;
}

.cat-btn.active{
  background:var(--blue);
  color:#111827;
}

.filters{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:14px;
}

input,select{
  width:100%;
  padding:15px;
  border-radius:15px;
  border:1px solid #d1d5db;
  font-size:15px;
  background:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:20px;
}

.stat-box{
  background:white;
  border-radius:22px;
  padding:18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.stat-box h3{
  font-size:30px;
  margin-bottom:5px;
  color:var(--black);
}

.stat-box p{
  color:#6b7280;
  font-weight:600;
}

.grid{
  margin-top:22px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.product-card{
  background:white;
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  box-shadow:0 5px 16px rgba(0,0,0,.05);
  transition:.2s;
  cursor:pointer;
}

.product-card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(56,189,248,.18);
}

.product-img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:16px;
  background:#f5f7fb;
  margin-bottom:14px;
  padding:8px;
}

.product-title{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
  color:#0f172a;
}

.product-meta{
  color:#6b7280;
  margin-bottom:10px;
  font-size:14px;
}

.qty{
  display:inline-block;
  margin-top:12px;
  background:#eef2ff;
  color:#4338ca;
  padding:7px 13px;
  border-radius:999px;
  font-weight:700;
}

.price{
  margin-top:12px;
  font-size:20px;
  font-weight:800;
}

.empty{
  padding:22px;
  border-radius:18px;
  background:white;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:100;
}

.modal-content{
  background:white;
  width:100%;
  max-width:900px;
  border-radius:24px;
  padding:24px;
  max-height:90vh;
  overflow:auto;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  border:none;
  background:#ef4444;
  color:white;
  width:42px;
  height:42px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:13px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
  font-size:14px;
}

th{
  background:#0f172a;
  color:white;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  color:white;
  font-size:12px;
  font-weight:bold;
}

.nuevo{background:#16a34a;}
.usado{background:#f59e0b;}
.encaja{background:#2563eb;}

@media(max-width:900px){
  .hero-inner{
    flex-direction:column;
    gap:16px;
    text-align:center;
  }

  .hero-text{
    text-align:center;
  }

  .logo{
    width:190px;
  }

  .hero h1{
    font-size:32px;
  }

  .hero p{
    font-size:15px;
  }

  .access-grid{
    grid-template-columns:1fr;
  }

  .filters{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }
}

@media(max-width:650px){
  .hero{
    padding:18px 14px;
  }

  .logo{
    width:170px;
  }

  .hero-badge{
    font-size:13px;
    padding:8px 13px;
  }

  .hero h1{
    font-size:30px;
  }

  .hero p{
    font-size:14px;
  }

  .container{
    padding:18px;
  }

  .card{
    padding:20px;
    border-radius:22px;
  }

  .access-title{
    font-size:30px;
  }

  .access-btn{
    font-size:20px;
    padding:20px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .product-img{
    height:150px;
  }
}
</style>
</head>

<body>

<section id="home">

  <div class="hero">
    <div class="hero-inner">
      <img src="logo.png" class="logo" alt="Technology Sales">

      <div class="hero-text">
        <div class="hero-badge">Inventario actualizado para clientes</div>
        <h1>Catálogo de Inventario</h1>
        <p>Consulta disponibilidad, precios, colores y sucursales en tiempo real.</p>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2 class="access-title">Selecciona tu acceso</h2>
      <p class="access-sub">Ingresa al catálogo según tu tipo de cliente o administración.</p>

      <div class="access-grid">
        <button class="access-btn btn-mayorista" onclick="login('mayorista')">📦 Mayoristas</button>
        <button class="access-btn btn-revendedor" onclick="login('revendedor')">🛒 Revendedores</button>
        <button class="access-btn btn-admin" onclick="login('administracion')">⚙️ Administración</button>
      </div>
    </div>
  </div>

</section>
